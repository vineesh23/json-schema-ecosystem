name: Collect Ecosystem Metrics

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

  # Also run on pushes to main (so first-time setup is visible)
  push:
    branches: [main]
    paths:
      - 'backend/src/**'
      - '.github/workflows/collect-metrics.yml'

permissions:
  contents: write   # needed to commit output files back to the repo

jobs:
  collect:
    name: Collect & Commit Metrics
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can safely push

      # ── 2. Set up Node ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        working-directory: backend

      # ── 4. Run collector ─────────────────────────────────────────────────
      - name: Collect ecosystem metrics
        run: npx ts-node src/index.ts
        working-directory: backend
        env:
          # Provide a GitHub token to avoid unauthenticated API rate limits (60 req/hr).
          # GITHUB_TOKEN is automatically available in Actions — no secret setup needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Generate dashboard HTML ───────────────────────────────────────
      - name: Generate dashboard
        run: npx ts-node src/services/generateDashboard.ts
        working-directory: backend
        continue-on-error: true   # don't fail the whole run if rendering fails

      # ── 6. Commit output back to main ────────────────────────────────────
      - name: Commit updated metrics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the output directory
          git add backend/output/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit — skipping."
          else
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "chore(metrics): auto-update ${DATE} [skip ci]"
            git push
          fi
