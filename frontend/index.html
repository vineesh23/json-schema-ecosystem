<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Schema Ecosystem Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* GitHub Dark Mode style */
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 { color: #58a6ff; }
        .dashboard {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>Ecosystem Observability PoC</h1>
    <p>Live metrics from the JSON Schema ecosystem.</p>

    <div class="dashboard">
        <div class="card">
            <canvas id="npmChart"></canvas>
        </div>

        <div class="card">
            <canvas id="githubChart"></canvas>
        </div>
    </div>

    <script>
        // --- 🚨 PLUG YOUR NEW JSON DATA IN HERE 🚨 ---
        const npmData = {
            ajv: 264141721,        // Replace with your actual ajv number
            jsonschema: 2500000,   // Replace with your actual jsonschema number
            yup: 15000000          // Replace with your actual yup number
        };

        const githubData = {
            topicCount: 2414,      // Replace with your actual repo count
            specStars: 4500,       // Replace with actual json-schema-spec stars
            specIssues: 120        // Replace with actual json-schema-spec open issues
        };
        // ----------------------------------------------

        // 1. Render NPM Chart (Competitor Comparison)
        new Chart(document.getElementById('npmChart'), {
            type: 'bar',
            data: {
                labels: ['AJV', 'jsonschema', 'Yup'],
                datasets: [{
                    label: 'Weekly NPM Downloads',
                    data: [npmData.ajv, npmData.jsonschema, npmData.yup],
                    backgroundColor: [
                        '#cb3837', // NPM Red
                        '#f39c12', // Orange
                        '#3498db'  // Blue
                    ],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { 
                    legend: { display: false }, 
                    title: { display: true, text: 'Validator Market Share (Weekly)', color: '#c9d1d9', font: { size: 16 } } 
                },
                scales: { 
                    y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }, 
                    x: { ticks: { color: '#8b949e' }, grid: { display: false } } 
                }
            }
        });

        // 2. Render GitHub Chart (Multi-Metric)
        new Chart(document.getElementById('githubChart'), {
            type: 'bar',
            data: {
                labels: ['Repos w/ Topic', 'Spec Stars', 'Spec Open Issues'],
                datasets: [{
                    label: 'GitHub Stats',
                    data: [githubData.topicCount, githubData.specStars, githubData.specIssues],
                    backgroundColor: [
                        '#2ea043', // Green
                        '#e3b341', // Yellow/Gold (Stars)
                        '#f85149'  // Red (Issues)
                    ],
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                plugins: { 
                    legend: { display: false }, 
                    title: { display: true, text: 'GitHub Community Health', color: '#c9d1d9', font: { size: 16 } } 
                },
                scales: { 
                    y: { 
                        type: 'logarithmic', // Using log scale because stars and issues differ wildly in size
                        ticks: { color: '#8b949e' }, 
                        grid: { color: '#30363d' } 
                    }, 
                    x: { ticks: { color: '#8b949e' }, grid: { display: false } } 
                }
            }
        });
    </script>
</body>
</html>
